<style>
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: #07090E; color: var(--text-body); -webkit-font-smoothing: antialiased; }
  .serif { font-family: var(--font-sans); font-weight: 700; }
  a { color: var(--ws-mint); }
  a:hover { color: var(--mint-600); }
  ::selection { background: var(--ws-mint); color: var(--ws-black); }

  .reveal { opacity: 0; transform: translateY(18px); transition: opacity .7s var(--ease-out,cubic-bezier(.22,.61,.36,1)), transform .7s var(--ease-out,cubic-bezier(.22,.61,.36,1)); }
  .reveal.in { opacity: 1; transform: none; }

  .s0-cta:hover { transform: translateY(-3px); box-shadow: 0 20px 52px rgba(133,225,210,.5); }

  @keyframes tb-eq { 0%,100% { transform: scaleY(.92); } 50% { transform: scaleY(.64); } }
  @keyframes s0-blink { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(.08); } }
  @keyframes s0-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes s0-pulse { 0% { transform: scale(.6); opacity:.55; } 100% { transform: scale(2.6); opacity:0; } }
  @keyframes s0-hint { 0%,100% { transform: translateY(0); opacity:.5; } 50% { transform: translateY(7px); opacity:1; } }
  @keyframes tb-modalIn { from { opacity: 0; transform: translateY(14px) scale(.98); } to { opacity: 1; transform: none; } }

  @media (max-width: 1024px) {
    .s0-nav-side { display: none !important; }
    .s0-nav-dot { display: flex !important; }
  }

  @media (prefers-reduced-motion: reduce) {
    .reveal { opacity: 1 !important; transform: none !important; animation: none !important; }
    .tb-eqbar { animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="robotB/app.jsx"></script>
</body>
</html>
